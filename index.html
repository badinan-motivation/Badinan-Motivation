<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badinan Motivation</title>
<style>
* {
box-sizing: border-box;
margin: 0;
padding: 0;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
background: linear-gradient(135deg, #2c1654 0%, #d35400 50%, #f39c12 100%);
background-attachment: fixed;
color: #fff;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 20px;
}
.container {
background: rgba(255, 255, 255, 0.12);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border: 1px solid rgba(255, 255, 255, 0.2);
padding: 40px 30px;
border-radius: 20px;
box-shadow: 0 15px 35px rgba(0,0,0,0.3);
max-width: 600px;
width: 100%;
text-align: center;
position: relative;
}
h1 {
font-size: 1.8rem;
color: #fff;
margin-bottom: 25px;
text-shadow: 0 2px 4px rgba(0,0,0,0.3);
}
.quote-box {
font-size: 1.25rem;
line-height: 1.8;
color: #fff;
min-height: 110px;
display: flex;
align-items: center;
justify-content: center;
padding: 0 15px;
margin-bottom: 30px;
font-weight: 500;
text-shadow: 0 1px 3px rgba(0,0,0,0.3);
transition: opacity 0.5s ease-in-out;
}
.btn {
background-color: #e67e22;
color: white;
border: none;
padding: 12px 30px;
font-size: 1rem;
border-radius: 50px;
cursor: pointer;
transition: background 0.3s, transform 0.1s;
box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
font-weight: bold;
}
.btn:hover {
background-color: #d35400;
}
.btn:active {
transform: scale(0.98);
}
.settings-section {
margin-top: 35px;
padding-top: 25px;
border-top: 1px solid rgba(255, 255, 255, 0.2);
text-align: right;
}
.settings-section h3 {
font-size: 1.1rem;
color: #f1c40f;
margin-bottom: 15px;
}
.form-group {
margin-bottom: 15px;
display: flex;
flex-direction: column;
gap: 8px;
}
.form-group label {
font-size: 0.95rem;
color: #f0f0f0;
}
.form-group input[type="time"] {
padding: 10px;
border-radius: 8px;
border: 1px solid rgba(255, 255, 255, 0.3);
background: rgba(0, 0, 0, 0.2);
color: #fff;
font-size: 1rem;
outline: none;
text-align: center;
}
.notif-btn {
background-color: #27ae60;
margin-top: 5px;
}
.notif-btn:hover {
background-color: #219653;
}
.music-player {
margin-top: 25px;
background: rgba(0, 0, 0, 0.2);
padding: 15px;
border-radius: 12px;
display: flex;
align-items: center;
justify-content: space-between;
border: 1px solid rgba(255, 255, 255, 0.1);
}
.music-player span {
font-size: 0.9rem;
color: #f0f0f0;
}
audio {
width: 65%;
height: 35px;
}
</style>
</head>
<body>
<div class="container">
<h1>هەستانەکا نوو، ژیانەکا پڕ هێز</h1>
<!-- بەشێ ڕستان -->
<div class="quote-box" id="quoteDisplay">
ئەڤرۆ ڕۆژا تە یە، پێنگاڤێ باڤێژە!
</div>
<button class="btn" onclick="showRandomQuote()">پەیڤەکا نوو ببینە</button>
<!-- بەشێ دەمژمێرا نۆتیفیکەیشنێ (ئۆپشناڵ) -->
<div class="settings-section">
<h3>دیارکرنا دەمژمێرا نۆتیفیکەیشنێ (ئۆپشناڵ)</h3>
<div class="form-group">
<label for="notificationTime">کەنگی دڤێت نۆتیفیکەیشن سەر شاشا تە بهێت؟</label>
<input type="time" id="notificationTime">
<button class="btn notif-btn" onclick="setNotificationAlarm()">تۆمارکرنا دەمی</button>
</div>
</div>
<!-- بەشێ مۆزیکا ئارام و هێمن -->
<div class="music-player">
<span>مۆزیکا ئارام (بژاردە)</span>
<audio controls loop>
<source src="[https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf756.mp3?filename=lofi-study-112191.mp3](https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf756.mp3?filename=lofi-study-112191.mp3)" type="audio/mpeg">
گەرۆکا تە مۆزیکێ پشتگیرى ناکەت.
</audio>
</div>
</div>
<script>
const quotes = [
"ئەڤرۆ ڕۆژا تە یە، پێنگاڤێ باڤێژە!",
"تو گەلەک ژ هندێ ب هێزتری تو دەستا ب داهێلی.",
"بخۆ بژی، نە بۆ ڕازیکرنا خەڵکی.",
"هەر نوکە دەست پێ بکە، چ جاران درەنگ نینە.",
"تو یا ب هێزی، باوەریێ ب شیانێن خۆ بینە.",
"ئەڤرۆ دەرفەتەکا نووی یە بۆ هندێ تو بگەهیە حەزێن خۆ.",
"خەونێن تە مەزنن، هەولدانێن خۆ ژی مەزنتر لێ بکە.",
"تو داهێنەرا ژیانا خۆیی، جوان ڕەنگ بکە.",
"هەر تشتەکێ ئەڤرۆ دکەی، سوبە دێ پێ کەیفخۆش بی.",
"تو ب تنێ دشێی ژیانا خۆ بگۆهۆڕی، دەست پێ بکە.",
"ئارام بە، خودێ دێ دەرگەهێن خێڕێ بۆ تە ڤەکەت.",
"پێنگاڤەکا بچووک باشترە ژ ڕاوەستانێ.",
"تو ژ هەژی باشترین تشتی د ژیانێ دا.",
"دەست ژ هیڤیێن خۆ بەرنەدە، تو کەسەک خودان شیانی.",
"ئەڤرۆ کار بکە، دا کو سوبە شانازیێ ب خۆ بەی.",
"ترسێ ژ دلێ خۆ دەر بێخە و بەرەف پێش هەرە.",
"ماندیبوونا ئەڤرۆ، دێ بیتە کەیفخۆشیا سوبەهی.",
"کەسەک نینە شوینا تە شەڕی بۆ خەونێن تە بکەت.",
"بڕیارێ بدە و چو جاران سستیێ تێدا نەکە.",
"هەر دەمەکێ تو تێدا دژی، دەمەکێ زێڕینە.",
"ژ دەستپێکرنا نوو نەترسە، ئەڤە دەرفەتا تە یە.",
"ئەڤرۆ یا پڕە ژ وزە و هێزێ، بکاربینە!",
"تو یا بڕیاردەری، چو هێز نەشێن تە ڕاگرن.",
"هەول بدە ئەڤرۆ باشتر بی ژ دوهی.",
"سەبر کلیلا هەر دەرگەهەکەکێ داخستی یە.",
"ب دڵسۆزی کار بکە، ئەنجام دێ تە مەندەهوش کەن.",
"تو یا تایبەتی، چو کەس وەک تە نین.",
"ژیان یا کورتە، ب کەیف و سەرکەفتن دەرباز بکە.",
"سەرکەفتن ناهێت، پێدڤییە تو بۆ بچی.",
"خودێ دگەل تە یە، چ خەمان نەخۆ.",
"تو خودان ئیرادەیەکا بهێزی.",
"بێدەنگ کار بکە، بهێڵە دەنگێ سەرکەفتنا تە بڵند ببیت.",
"هەر ڕۆژەکا نوو، شانسەک نوو یە بۆ سەرکەفتنێ.",
"پاشەڕۆژ یا وان کەسانە یێن باوەری ب خەونێن خۆ هەی.",
"ئارمانجێن مەزن قوربانیێن مەزن دڤێن.",
"تو ژ وێ ب هێزتری یا دیار دکەی.",
"ئارمانج بێ پلان، تنێ خەونەکە.",
"بچووکترین پێنگاڤ ژی باشترە ژ جهەکێ دیار.",
"کەسێ نەکە خودانێ بریارێن خۆ؛ ژیانا تە یا تە یە و کەس ماف نینە تێک بدەت.",
"تو نە مەجبووری کەسەکێ ژ خۆ ڕازیکەی، گرنگ ئەوە تو ژ خۆ ڕازی بی و ئەڤە بەسە.",
"هندەک جار دوورکەفتنا ژ خەلکی، مەزنترین دیارییە تو ددەیه‌ گیانێ خۆ.",
"تو گەلەک ژ هندێ بهاتری کو دەمێ خۆ بۆ کەسێن بێ مفا تەرخان بکەی.",
"تشتێ هەر گرنگ ل ڤێ جیهانێ، ئارامیا مێشکێ تە یە؛ هەر تشتێ وی تێک بدەت، ژێ دوور بکەڤە.",
"کەسێن نەرێنی تنێ دڤێن هێزا تە ببڕن؛ نەهێلە ئارامیا ڕۆژا تە تێک بدەن.",
"هەر دەمێ تو هەول ددەی هەمی کەسی ڕازی بکەی، وی دەمی تو یێ خۆ ژ دەست ددەی.",
"دەمێ خۆ بو کەسن بێ مفا تەرخان نەکە.",
"تشتێ هەرە خراب ئەوە تو ژیانا خۆ ب ڕازیکرنا خەلکی ڤە بۆرینی.",
"دوورکەفتنا ژ کەسێن نەرێنی، نیڤا سەرکەفتن و ئارامیا تە یە.",
"خەونێن تە ژ ڕایێن خەلکی گرانبەها ترن؛ لدووڤ دەنگێ دلێ خوە هەرە نەک بۆچونا خەلکی.",
"گۆتنا "نەخێر" بۆ هەر ژینگەهەکا کو ڕەخنەیێن نەدرۆست ل تە بگرن و باوەرییا تە ب خۆ بشکینن.",
"دانانا سنورێن توند دگەل دەوروبەرێن نەرێنی بۆ هندێ ڕۆژا تە ب کەیف و بێ کێشە دەرباز ببێت."
];
function showRandomQuote() {
const quoteDisplay = document.getElementById("quoteDisplay");
quoteDisplay.style.opacity = 0;
setTimeout(() => {
const randomIndex = Math.floor(Math.random() * quotes.length);
quoteDisplay.textContent = quotes[randomIndex];
quoteDisplay.style.opacity = 1;
}, 250);
}
// سیستەمێ نۆتیفیکەیشنێ ل دویڤ دەمژمێرا هاتیە دانان
function setNotificationAlarm() {
const timeInput = document.getElementById("notificationTime").value;
if (!timeInput) {
alert("هیچ دەمژمێرەک نەهاتیە دیارکرن!");
return;
}
// داخوازا دەستوورێ نۆتیفیکەیشنی ژ برەوسەرا موبایلێ
if (window.Notification && Notification.permission !== "granted") {
Notification.requestPermission().then(permission => {
if (permission === "granted") {
alert("دەستوور هاتە وەرگرتن! دێ د دەمێ دیارکری دا نۆتیفیکەیشن بۆ تە هێت.");
}
});
} else {
alert("دەم هاتە گرتن: " + timeInput + ". دێ نۆتیفیکەیشن بۆ تە هێت.");
}
// پشکنینا دەمی بۆ ناردنا نۆتیفیکەیشنی
setInterval(() => {
const now = new Date();
const hours = String(now.getHours()).padStart(2, '0');
const minutes = String(now.getMinutes()).padStart(2, '0');
const currentTime = ${hours}:${minutes};
if (currentTime === timeInput) {
if (window.Notification && Notification.permission === "granted") {
const randomQ = quotes[Math.floor(Math.random() * quotes.length)];
new Notification("Badinan Motivation", {
body: randomQ,
icon: ""
});
}
}
}, 60000); // هه‌می دەقەیەکێ دپشکێنێت
}
</script>
</body>
</html>
