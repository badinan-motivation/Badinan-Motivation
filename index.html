
<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badinan Motivation - Secret Messages</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0a192f 0%, #0f3460 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #8892b0;
            --accent-color: #64ffda;
            --accent-glow: rgba(100, 255, 218, 0.2);
        }

        body { 
            font-family: 'Segoe UI', 'Tahoma', sans-serif; 
            background: var(--bg-gradient); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            padding: 25px 20px; 
            border-radius: 28px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            text-align: center; 
            max-width: 400px; 
            width: 100%; 
            box-sizing: border-box;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-area { 
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main); 
            font-size: 15px; 
            font-weight: 700;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a192f;
            font-weight: bold;
        }

        .notes-section {
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 15px;
            text-align: right;
            margin-top: 10px;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }

        /* Modal / پەنجەرەیێن دەرکەتنی */
        .modal-overlay {
            display: flex;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-box {
            background: #0f3460;
            border: 1px solid var(--card-border);
            padding: 25px;
            border-radius: 24px;
            max-width: 360px;
            width: 100%;
            text-align: right;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-height: 85vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-bar">
            <div class="logo-area">
                <div class="logo-icon">💌</div>
                <span id="current-user-display" style="color: var(--accent-color);">مێڤان</span>
            </div>
            <span style="font-size: 11px; color: var(--text-muted); cursor: pointer;" onclick="document.getElementById('account-modal').style.display='flex'">گۆڕینا ئەکاونتی 🔄</span>
        </div>

        <div class="notes-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="color: var(--accent-color); font-size: 14px; margin: 0;">💌 نامەیێن نهێنی بۆ هەڤالان</h3>
                <span style="font-size: 11px; color: var(--accent-color); cursor: pointer; text-decoration: underline; font-weight: bold;" onclick="openInboxModal()">صندوقا من (<span id="inbox-count">0</span>)</span>
            </div>
            <label style="font-size: 11px; color: var(--text-muted);">ناڤێ وێ کەسێ:</label>
            <input type="text" id="target-user" placeholder="بۆ نموونە: Huda" class="form-input">
            
            <label style="font-size: 11px; color: var(--text-muted);">نڤیسینا نامەیێ:</label>
            <textarea id="private-msg-text" placeholder="ناما خۆ لێرە بنڤیسە..." style="width: 100%; height: 60px; padding: 8px; border-radius: 10px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.05); color: var(--text-main); font-size: 12px; box-sizing: border-box; resize: none; outline: none; margin-bottom: 10px;"></textarea>
            
            <button onclick="sendSecretMessage()" style="width: 100%; padding: 10px; font-size: 12px; background: var(--accent-color); color: #0a192f; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">هنارتنا نامەیێ بۆ هەڤالی 🚀</button>
        </div>

        <div style="margin-top: 15px; font-size: 11px; color: var(--text-muted);">
            Created by: <b>Huda Shahin sindi</b>
        </div>
    </div>

    <div id="account-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box" style="text-align: center;">
            <div style="font-size: 32px; margin-bottom: 10px;">🔐</div>
            <h3 style="color: var(--accent-color); margin-top: 0; font-size: 18px;">چێکرنا ئەکاونتا نهێنی</h3>
            <p style="font-size: 12px; color: var(--text-muted); line-height: 1.4;">ناڤەکێ خۆ بنڤیسە دا کەسێن دی بشێن نامەیێن نهێنی بۆ تە بنێرن.</p>
            
            <input type="text" id="acc-username" placeholder="ناڤێ تە (بۆ نموونە: Huda)" class="form-input">
            <input type="password" id="acc-password" placeholder="کۆدا نهێنی (Password)" class="form-input">
            
            <button onclick="setupAccount()" style="width: 100%; padding: 10px; background: var(--accent-color); color: #0a192f; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 13px; margin-top: 5px;">چوونە ژوورڤە / تۆمارکرن</button>
        </div>
    </div>

    <div id="inbox-modal" class="modal-overlay" style="display: none;" onclick="document.getElementById('inbox-modal').style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="color: var(--accent-color); margin-top: 0; font-size: 15px;">📥 نامەیێن نهێنی یێن بۆ تە هاتین</h3>
            <div id="inbox-list-container" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 40vh; overflow-y: auto;"></div>
            <button onclick="document.getElementById('inbox-modal').style.display='none'" style="width:100%; padding:8px; background:var(--accent-color); color:#0a192f; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">گرتن</button>
        </div>
    </div>

    <script>
        let currentUser = null;

        window.addEventListener('DOMContentLoaded', () => {
            let savedUser = localStorage.getItem('badinan_active_user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('current-user-display').textContent = currentUser.name;
                document.getElementById('account-modal').style.display = 'none';
                updateInboxCount();
            } else {
                document.getElementById('account-modal').style.display = 'flex';
            }
        });

        function setupAccount() {
            let name = document.getElementById('acc-username').value.trim();
            let pass = document.getElementById('acc-password').value.trim();
            if(!name || !pass) {
                alert("هیڤیە ناڤ و کۆدا نهێنی بنڤیسە!");
                return;
            }
            currentUser = { name, pass };
            localStorage.setItem('badinan_active_user', JSON.stringify(currentUser));
            document.getElementById('current-user-display').textContent = name;
            document.getElementById('account-modal').style.display = 'none';
            updateInboxCount();
        }

        function sendSecretMessage() {
            let target = document.getElementById('target-user').value.trim();
            let msg = document.getElementById('private-msg-text').value.trim();
            
            if(!target || !msg) {
                alert("هیڤیە ناڤێ کەسی و نامێ بنڤیسە!");
                return;
            }
            if(!currentUser) {
                alert("بەری نامەیێ بنێری، پێدڤیە ئەکاونتێ خۆ چێکەی!");
                return;
            }

            let allMessages = JSON.parse(localStorage.getItem('badinan_secret_messages') || '[]');
            allMessages.push({
                to: target,
                from: currentUser.name,
                text: msg,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('badinan_secret_messages', JSON.stringify(allMessages));
            
            document.getElementById('target-user').value = '';
            document.getElementById('private-msg-text').value = '';
            alert("✨ ناما تە ب سەرکەفتن بۆ (" + target + ") هاتە هنارتن!");
            updateInboxCount();
        }

        function openInboxModal() {
            if(!currentUser) return;
            let container = document.getElementById('inbox-list-container');
            container.innerHTML = '';
            
            let allMessages = JSON.parse(localStorage.getItem('badinan_secret_messages') || '[]');
            let myMessages = allMessages.filter(m => m.to.toLowerCase() === currentUser.name.toLowerCase());
            
            if(myMessages.length === 0) {
                container.innerHTML = '<p style="font-size: 12px; color: var(--text-muted); text-align: center;">هێشتا چ نامە بۆ تە نەهاتینە!</p>';
            } else {
                myMessages.forEach((m, i) => {
                    let div = document.createElement('div');
                    div.style.background = 'rgba(255,255,255,0.05)';
                    div.style.padding = '8px';
                    div.style.borderRadius = '8px';
                    div.style.fontSize = '12px';
                    div.style.color = 'var(--text-main)';
                    div.innerHTML = `<b style="color: var(--accent-color);">ژلایێ: ${m.from}</b> <span style="font-size:10px; color:var(--text-muted);">(${m.date})</span><p style="margin: 4px 0 0 0;">${m.text}</p>`;
                    container.appendChild(div);
                });
            }
            document.getElementById('inbox-modal').style.display = 'flex';
        }

        function updateInboxCount() {
            if(!currentUser) return;
            let allMessages = JSON.parse(localStorage.getItem('badinan_secret_messages') || '[]');
            let count = allMessages.filter(m => m.to.toLowerCase() === currentUser.name.toLowerCase()).length;
            document.getElementById('inbox-count').textContent = count;
        }
    </script>
</body>
</html>
