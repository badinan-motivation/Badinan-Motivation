<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badinan Motivation</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0a192f 0%, #0f3460 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #8892b0;
            --accent-color: #64ffda;
            --accent-glow: rgba(100, 255, 218, 0.2);
            --premium-bg: rgba(254, 243, 199, 0.05);
            --premium-border: rgba(251, 191, 36, 0.3);
            --premium-text: #fde047;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #e6f0fa 0%, #bcd4e6 100%);
            --card-bg: #ffffff;
            --card-border: #d1d5db;
            --text-main: #0a192f;
            --text-muted: #4b5563;
            --accent-color: #0f3460;
            --accent-glow: rgba(15, 52, 96, 0.1);
            --premium-bg: #fef3c7;
            --premium-border: #fbbf24;
            --premium-text: #b45309;
        }

        body { 
            font-family: 'Segoe UI', 'Tahoma', sans-serif; 
            background: var(--bg-gradient); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background 0.5s ease;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 20px; 
            border-radius: 32px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center; 
            max-width: 440px; 
            width: 100%; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-area h1 { 
            color: var(--text-main); 
            font-size: 18px; 
            font-weight: 700;
            margin: 0; 
            letter-spacing: 0.5px;
        }

        .circle-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .circle-btn:hover {
            border-color: var(--accent-color);
            background: var(--accent-glow);
        }

        /* بەشێ دەمژمێر و ڕۆژمێری ل ڕەخ ڤە (٢٤ سەعەتی بێ چۆننەڤی) */
        .datetime-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.15);
            padding: 12px 18px;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            margin-bottom: 20px;
        }

        .clock-box {
            text-align: right;
        }

        #clock { 
            font-size: 24px; 
            font-weight: 800; 
            color: var(--accent-color); 
            margin: 0;
            font-variant-numeric: tabular-nums;
        }

        #day-period {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 600;
        }

        .calendar-box {
            text-align: left;
        }

        #calendar-date {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        #calendar-day {
            font-size: 12px;
            color: var(--accent-color);
            margin-top: 2px;
            font-weight: 600;
        }

        .quote-box {
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        p#main-text { 
            color: var(--text-main); 
            font-size: 18px; 
            line-height: 1.7; 
            margin: 0;
            font-weight: 600;
        }

        .main-btn { 
            background-color: var(--accent-color); 
            color: #0a192f; 
            border: none; 
            padding: 15px; 
            border-radius: 14px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 4px 14px var(--accent-glow);
            transition: all 0.2s;
        }
        [data-theme="light"] .main-btn {
            color: white;
        }
        .main-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .notification-setting {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.1);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--card-border);
        }

        .noti-btn {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #0f3460;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }
        .noti-btn:hover {
            opacity: 0.9;
        }

        .premium { 
            background: var(--premium-bg); 
            border: 1px solid var(--premium-border); 
            padding: 15px 20px; 
            border-radius: 20px; 
            margin-top: 20px; 
            text-align: right;
            cursor: pointer;
        }

        .premium strong {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: var(--premium-text);
            margin-bottom: 8px;
        }

        .premium ul {
            margin: 0;
            padding-right: 18px;
            font-size: 12px;
            color: var(--text-main);
            line-height: 1.8;
        }
        .premium ul li {
            margin-bottom: 4px;
            list-style-type: square;
        }

        .footer-credits { 
            margin-top: 20px; 
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-bar">
            <div class="logo-area">
                <h1>Badinan Motivation</h1>
            </div>
            <button class="circle-btn" onclick="toggleTheme()">🌓</button>
        </div>

        <!-- بەشێ دەمژمێر و ڕۆژمێری ل ڕەخ ڤە (٢٤ سەعەتی بێ چۆننەڤی) -->
        <div class="datetime-container">
            <div class="clock-box">
                <div id="clock">00:00</div>
                <div id="day-period">بارکردن...</div>
            </div>
            <div class="calendar-box">
                <div id="calendar-date">--/--/----</div>
                <div id="calendar-day">ڕۆژ</div>
            </div>
        </div>

        <div class="quote-box">
            <p id="main-text">ئەڤرۆ ڕۆژا تە یە، پێنگاڤێ باڤێژە!</p>
        </div>

        <button class="main-btn" onclick="getNewQuote()">گۆتنەکا نوو و ب هێز</button>

        <!-- بەشێ چالاکرنا نۆتیفیکەیشنا فەرمی پێش لێدانا کاتژمێرێ -->
        <div class="notification-setting">
            <button class="noti-btn" style="background:#2ecc71; margin-bottom:8px;" onclick="requestPermissionFirst()">🔔 ١. دەستووریدانا نۆتیفیکەیشنان</button>
            <button class="noti-btn" onclick="startOneHourTimer()">⏰ ٢. نۆتیفیکەیشن پشتی دەمژمێرەکێ دی</button>
        </div>

        <!-- بەشێ پرێمیۆم -->
        <div class="premium" onclick="alert('ئەڤ بەشە د جێبەجێکرنێ دایە')">
            <strong>
                <span>✨ ئەڤ بەشە بۆ ئەندامێن پرێمیۆمە</span>
                <span>🔒</span>
            </strong>
            <ul>
                <li>بابەتێن پەیوەندیا ژەهراوی</li>
                <li>ڕاوەستان هەمبەر فشارێن جڤاکی</li>
                <li>خراب بکارئینانا سۆشیال میدیایێ</li>
            </ul>
        </div>

        <div class="footer-credits">
            Created by: <b>Huda Shahin sindi</b><br>
            هەمی ماف پاراستینە © 2026
        </div>
    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            
            // دەمژمێرا ٢٤ سەعەتی بێ چۆننەڤی (وەک 09:56 یان 12:00)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            
            // ناڤێن دەمێن ڕۆژ و شەڤێ
            const hourNum = now.getHours();
            let period = "";
            if (hourNum >= 5 && hourNum < 12) {
                period = "🌅 سپێدەهى";
            } else if (hourNum >= 12 && hourNum < 16) {
                period = "☀️ نیڤرۆ";
            } else if (hourNum >= 16 && hourNum < 19) {
                period = "🌇 ئێڤارى";
            } else {
                period = "🌙 شەڤ";
            }
            document.getElementById('day-period').textContent = period;

            // ڕۆژمێر (Calendar) ب زمانێ کوردی
            const optionsDay = { weekday: 'long' };
            const daysMap = {
                'Sunday': 'یەکشەممە',
                'Monday': 'دووشەممە',
                'Tuesday': 'سێشەممە',
                'Wednesday': 'چارشەممە',
                'Thursday': 'پێنجشەممە',
                'Friday': 'ئەینی',
                'Saturday': 'شەممە'
            };
            
            const englishDay = now.toLocaleDateString('en-US', optionsDay);
            const kurdishDay = daysMap[englishDay] || englishDay;
            
            document.getElementById('calendar-date').textContent = now.toLocaleDateString('en-GB');
            document.getElementById('calendar-day').textContent = kurdishDay;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();

        // هەموو پەیڤێن تە یێن کڤن ب تەمامی + ٤٠+ پەیڤێن نوو یێن هاندەر
        const quotes = [
            // --- پەیڤێن تە یێن کڤن (هەموو هاتنە هێلان) ---
            "ئەڤرۆ ڕۆژا تە یە، پێنگاڤێ باڤێژە!",
            "تو گەلەک ژ هندێ ب هێزتری تو دەستا ب داهێلی.",
            "بخۆ بژی، نە بۆ ڕازیکرنا خەڵکی.",
            "هەر ل ڤێ چرکەیێ دەست پێ بکە، چ جاران درەنگ نینە.",
            "تو یا ب هێزی، باوەریێ ب شیانێن خۆ بینە.",
            "ئەڤرۆ دەرفەتەکا نووی یە بۆ هندێ تو بگەهیە حەزێن خۆ.",
            "خەونێن تە مەزنن، هەولدانێن خۆ ژی مەزنتر لێ بکە.",
            "تو داهێنەرا ژیانا خۆیی، جوان ڕەنگ بکە.",
            "هەر تشتەکێ ئەڤرۆ دکەی، سوبە دێ پێ کەیفخۆش بی.",
            "تو ب تنێ دشێی ژیانا خۆ بگۆهۆڕی، دەست پێ بکە.",
            "ئارام بە، خودێ دێ دەرگەهێن خێڕێ بۆ تە ڤەکەت.",
            "بگرنژە، گرنژینا تە هێزێ ددەتە دەوروبەرێن تە.",
            "پێنگاڤەکا بچووک باشترە ژ ڕاوەستانێ.",
            "تو ژ هەژی باشترین تشتی د ژیانێ دا.",
            "دەست ژ هیڤیێن خۆ بەرنەدە، تو کەسەک خودان شیانی.",
            "ئەڤرۆ کار بکە، دا کو سوبە شانازیێ ب خۆ بەی.",
            "ترسێ ژ دلێ خۆ دەر بێخە و بەرەف پێش هەرە.",
            "ماندیبوونا ئەڤرۆ، دێ بیتە کەیفخۆشیا سوبەهی.",
            "کەسەک نینە د شینا تە شەڕی بۆ خەونێن تە بکەت.",
            "بڕیارێ بدە و چو جاران سستیێ تێدا نەکە.",
            "هەر دەمەکێ تو تێدا دژی، دەمەکێ زێڕینە.",
            "باوەر بکە کو تو دشێی، نیڤا ڕێکێ تە بڕی.",
            "ژ دەستپێکرنا نوو نەترسە، ئەڤە دەرفەتا تە یە.",
            "فۆکەسێ بێخە سەر ئارمانجێ، نە ل سەر زحمەتیێ.",
            "ئەڤرۆ پڕە ژ وزە و هێزێ، بکاربینە!",
            "تو یا بڕیاردەری، چو هێز نەشێن تە ڕاگرن.",
            "هەول بدە ئەڤرۆ باشتر بی ژ دوهی.",
            "سەبر کلیلا هەر دەرگەهەکەکێ داخستی یە.",
            "ب دڵسۆزی کار بکە، ئەنجام دێ تە مەندەهوش کەن.",
            "تو یا تایبەتی، چو کەس وەک تە نین.",
            "چو جاران نەبێژە ئەز نەشێم، تو خودان هێزی.",
            "ژیان یا کورتە، ب کەیف و سەرکەفتن دەرباز بکە.",
            "هەر دڵۆپەکا ئارەقێ، تۆڤێ سەرکەفتنەکێ یە.",
            "گەشبین بە، داهات یێ تژی یە ژ ڕۆناهیێ.",
            "مرۆڤێ ب هێز ئەو کەسە یێ هەر جار ڕادبیتەڤە.",
            "کارێ خۆ ب عەشق بکە دا کو داهێنانێ تێدا بکەی.",
            "تو نەکەفتی، تە تەنێ ڕێکێن دی تاقی کرن.",
            "هەناسەکێ بگرە و ب هێزتر بەردەوام بە.",
            "سەرکەفتن ناهێت، پێدڤییە تو بۆ بچی.",
            "ئازا بە، چونکی ترس چو تشتان ناگۆهۆڕیت.",
            "خودێ دگەل تە یە، چ خەمان نەخۆ.",
            "تو خودان ئیرادەیەکا بهێزی.",
            "بێدەنگ کار بکە، بهێڵە دەنگێ سەرکەفتنا تە بڵند ببیت.",
            "هەر ڕۆژەکا نوو، شانسەک نوو یە بۆ سەرکەفتنێ.",
            "پاشەڕۆژ یا وان کەسانە یێن باوەری ب خەونێن خۆ هەی.",
            "تو گەهشتیە ڤێرە، کێم مایە بگەهیە لوتکەیێ!",

            // --- پەیڤێن نوو یێن لسەر هاتینە زێدەکرن (Motivation Platform Translations) ---
            "تەبعەتێ خۆ بگۆهۆڕە، ژیانا خۆ بگۆهۆڕە.",
            "باوەری ب خۆبینە، پێشیا کو کەسەکێ دی باوەری ب تە هەبت.",
            "برینێن تە دێ بنە سەرچاوەیا هێزا تە.",
            "هەر ڕۆژەک نوو دەرفەتەکە بۆ ژدایکبوونا تەیا نوو.",
            "سنوور تنێ د مێشکێ تە دەنە.",
            "ئارمانجێن مەزن قوربانیێن مەزن دڤێن.",
            "ڕابوردی بۆ فێربوونێ یە، نە بۆ ژیانێ.",
            "کەسێ سەرکەفتن نەئینایە بێی تێکشکان.",
            "تو ژ وێ ب هێزتری یا دیار دکەی.",
            "پەخشینا ئەرێنی ژیانێ ڕووهوژ دکەت.",
            "بێ دەنگی دگەل کارێ مەزن، بەرسڤا هەر شاشەیەکە.",
            "ئەڤە دەمێ تە یە، پاشڤە نەڤکشە.",
            "هەر تشتێ ب زەحمەت دەست پێ بکەت، ب نرخ کۆتایی پێ دێت.",
            "چارەنڤیسێ خۆ ب خوە بنڤیسە، ڕێ مەدە کەسەکێ بۆ تە بنڤیسێت.",
            "پشتی هەموو تاریکییەکێ، ڕوناهییەکا مەزن هەیە.",
            "ب هەستی کار نەکە، ب ئیرادە کار بکە.",
            "خوە ب کەسێ ڕووبەڕوو نەکە، تنێ ب وێنەیێ خوە یێ دوهی ڕووبەڕوو بە.",
            "ئارمانج بێ پلان، تنێ خەونەکە.",
            "دەمێ تە یێ زێڕین نەکە هەڕەس.",
            "بچووکترین پێنگاڤ ژی باشترە ژ جهەکێ دیار."
        ];

        function getNewQuote() {
            const textElement = document.getElementById('main-text');
            const randomIndex = Math.floor(Math.random() * quotes.length);
            textElement.textContent = quotes[randomIndex];
        }

        function requestPermissionFirst() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        alert("✓ دەستووری هاتەدان! نها دشێی دوگمەیا دووێ لێدەی بۆ ڕێکخستنا کاتژمێری.");
                    } else {
                        alert("پێدڤییە ڕێگایێ بدەی دا نۆتیفیکەیشن کار بکەن.");
                    }
                });
            }
        }

        function startOneHourTimer() {
            if (Notification.permission !== "granted") {
                alert("پێشتر کلیلێ ل سەر دوگمەیا سەوز بکە بۆ دەستووریدانێ!");
                return;
            }

            alert("⏰ کاتژمێر دەست پێ کر! ڕاستەوخۆ پشتی دەمژمێرەکا دی دێ نامەیەکا نوو بۆ تە هێت.");

            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * quotes.length);
                new Notification("Badinan Motivation ⏰", {
                    body: quotes[randomIndex],
                    icon: "https://fav.farm/🔥"
                });
            }, 3600000);
        }

        function toggleTheme() {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'light');
            }
        }
    </script>
</body>
</html>
